# Nom de l'application
spring.application.name=backend

# Connexion MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartcareer_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Port du serveur (optionnel, 8080 par défaut)
server.port=8080
jwt.secret=ChangeThisToAVeryLongRandomSecretKeyAtLeast256BitsForHS256Algorithm123456
jwt.expiration=86400000
logging.level.org.springframework.security=DEBUG

# Upload de fichiers
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/resumes
# --- AI / Groq Configuration ---
groq.api.key=${GROQ_API_KEY:votre-cle-api-groq}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile